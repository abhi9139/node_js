name: Sequential jobs
on:
 workflow_dispatch:
   inputs:
      jobs_to_run:
         description: 'which job to run?'
         required: true
         type: choice
         options: [job1,job2,job3,all]


jobs:
  job1:
    if: ${{inputs.jobs_to_run == "job1" || inputs.jobs_to_run == "all" }}
    runs-on: ubuntu-latest
    steps:
      - name: job1
        run: echo "job1 running"
  job2:
    if: ${{inputs.jobs_to_run == "job2" || inputs.jobs_to_run == "all" }}
    runs-on: ubuntu-latest
    steps:
      - name: job2
        run: echo "job2 running"      

  job3:
    if: ${{inputs.jobs_to_run == "job3" || inputs.jobs_to_run == "all" }}
    runs-on: ubuntu-latest
    steps:
      - name: job3
        run: echo "job3 running"


    
