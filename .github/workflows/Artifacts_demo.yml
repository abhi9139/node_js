name: Artifacts
on: push
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
       run: mkdir build
       run: echo This is the time > build/file.txt
      
       uses: actions/upload-artifact@v7
       with:
       name: first_artifact
       path: build/

    job2:
      runs-on: ubuntu:latest
      steps:
       steps:
       - uses: actions/download-artifact@v8
         with:
           name: first_artifact
           path: ./build
       - name: Display structure of downloaded files
         run: |
           ls-lart ./build
           cat ./build/file.txt 
    

