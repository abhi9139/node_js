name: CI 

on:
   workflow_dispatch


jobs:
   test:
     runs-on: ubuntu:latest 
     steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Install nodejs
        uses: actions/setup-node@v6
        with:
         node-version: 20


      - name: Start the app
        uses: npm start 

      - name: Waiting for the application to start
        uses: sleep 5


      - name: Check Health
        uses: curl -I "http://localhost:3000" || exit 1
         

