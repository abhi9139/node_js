name: Job Sequential
on:
 workflow_dispatch


jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
     - name: job1
       run: exit 1
  job2:
    runs-on: ubuntu-latest 
    if: ${{ always() }}
    needs: job1
    
    steps:
     - name: job2
       run: sleep 2
  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
     - name: job3
       run: sleep 2


